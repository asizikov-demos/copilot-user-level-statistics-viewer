name: Scheduled Plugin Versions Update
permissions:
  contents: write
  pull-requests: write

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-plugins:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update plugin versions
        run: npm run update:plugins
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate updater tests
        run: npm run test:run -- data-utils/update-plugin-versions.test.ts

      - name: Check for changes
        id: git-diff
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.git-diff.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "Update plugin versions"
          branch: automated/plugin-versions-update
          delete-branch: true
          title: Update Plugin Versions
          body: |
            This PR updates plugin version data:

            - **JetBrains**: rolling latest builds from the JetBrains plugin repository.
            - **VS Code** (`vscode.json`): maintains a rolling window of stable releases with
              release dates (source: `microsoft/vscode-copilot-chat` GitHub releases). Updated
              only when the stable release list changes. Preview builds do not trigger a change
              to this file.

            The changes were automatically generated by the scheduled workflow.
          assignees: asizikov
          labels: dependencies
